# Application
spring.application.name=farm-adoption-platform

# ========== MySQL ==========
# Local defaults are kept for development. Cloud deployment should override
# these values with environment variables.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/farm_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========== JPA / Hibernate ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ========== Server ==========
server.port=${PORT:8080}
server.servlet.context-path=/api

# ========== DeepSeek AI ==========
deepseek.api-key=${DEEPSEEK_API_KEY:}
deepseek.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
deepseek.model=${DEEPSEEK_MODEL:deepseek-chat}
deepseek.max-tokens=${DEEPSEEK_MAX_TOKENS:1024}
deepseek.temperature=${DEEPSEEK_TEMPERATURE:0.6}
